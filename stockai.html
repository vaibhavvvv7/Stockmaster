<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stockmaster | AI Corporate Intelligence</title>
    <link rel="stylesheet" href="stock.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts: OutFit for modern look -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="dashboard-wrapper">
        <header id="search-container">
            <div class="title-wrapper">
                <div class="logo">
                    <i data-lucide="activity" class="logo-icon"></i>
                    <h1 class="main-title">Stockmaster</h1>
                </div>
                <p class="subtitle">AI-Powered Corporate Intelligence Dashboard</p>
            </div>
            <div class="search-box">
                <i data-lucide="search" class="search-icon"></i>
                <input type="text" id="companyInput" placeholder="Enter company name or ticker (e.g., TSLA)..."
                    autocomplete="off">
                <div class="search-glow"></div>
            </div>
        </header>

        <main id="grid" class="hidden">
            <div class="card" style="--animation-order: 1;">
                <div class="card-header">
                    <div class="icon-wrapper"><i data-lucide="book-open"></i></div>
                    <h2>Corporate Historian</h2>
                </div>
                <div class="card-content" id="content-0">
                    <div class="skeleton-loader hidden">
                        <div class="skeleton-line title"></div>
                        <div class="skeleton-line"></div>
                        <div class="skeleton-line"></div>
                        <div class="skeleton-line short"></div>
                    </div>
                    <div class="actual-content"></div>
                </div>
            </div>

            <div class="card" style="--animation-order: 2;">
                <div class="card-header">
                    <div class="icon-wrapper"><i data-lucide="trending-up"></i></div>
                    <h2>Financial Analyst</h2>
                </div>
                <div class="card-content" id="content-1">
                    <div class="skeleton-loader hidden">
                        <div class="skeleton-line title"></div>
                        <div class="skeleton-line"></div>
                        <div class="skeleton-line"></div>
                        <div class="skeleton-line short"></div>
                    </div>
                    <div class="actual-content"></div>
                </div>
            </div>

            <div class="card" style="--animation-order: 3;">
                <div class="card-header">
                    <div class="icon-wrapper"><i data-lucide="target"></i></div>
                    <h2>Corporate Strategist</h2>
                </div>
                <div class="card-content" id="content-2">
                    <div class="skeleton-loader hidden">
                        <div class="skeleton-line title"></div>
                        <div class="skeleton-line"></div>
                        <div class="skeleton-line"></div>
                        <div class="skeleton-line short"></div>
                    </div>
                    <div class="actual-content"></div>
                </div>
            </div>

            <div class="card" style="--animation-order: 4;">
                <div class="card-header">
                    <div class="icon-wrapper"><i data-lucide="bar-chart-2"></i></div>
                    <h2>Market Expert</h2>
                </div>
                <div class="card-content" id="content-3">
                    <div class="skeleton-loader hidden">
                        <div class="skeleton-line title"></div>
                        <div class="skeleton-line"></div>
                        <div class="skeleton-line"></div>
                        <div class="skeleton-line short"></div>
                    </div>
                    <div class="actual-content"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        const API_KEY = "API KEY";
        const input = document.getElementById("companyInput");
        const searchContainer = document.getElementById("search-container");
        const grid = document.getElementById("grid");

        input.addEventListener("keydown", async (e) => {
            if (e.key === "Enter" && input.value.trim() !== "") {
                const company = input.value.trim();

                // Trigger transitions
                searchContainer.classList.add("active");
                grid.classList.remove("hidden");
                // slight delay to allow display:block to apply before opacity transition
                setTimeout(() => grid.classList.add("active"), 50);

                // Show skeletons, clear previous content
                for (let i = 0; i < 4; i++) {
                    const contentDiv = document.getElementById(`content-${i}`);
                    contentDiv.querySelector('.actual-content').innerHTML = "";
                    contentDiv.querySelector('.actual-content').classList.add('hidden');
                    contentDiv.querySelector('.skeleton-loader').classList.remove('hidden');
                }

                const combinedPrompt = `You are a corporate AI assistant. For the company "${company}", provide four concise analyses formatted STRICTLY as a JSON object with exactly these four keys:
"historian": Provide a concise introduction, list the founding members, founding date, and core business details.
"analyst": Provide a summary of the most recent profit statements, revenue, and key financial metrics.
"strategist": Summarize the recent major news events and detail any known future projects or strategic initiatives.
"marketExpert": Recommend a logical 'buy' price target and 'sell' price target. Briefly explain your reasoning. Include a disclaimer that this is AI generated and not financial advice.
Do not wrap the JSON in markdown blocks, just return raw, valid JSON. Format values using basic HTML tags like <strong> and <br> for readability. Use bullet points (•) where appropriate.`;

                fetchCombinedAgentData(combinedPrompt);
            }
        });

        async function fetchCombinedAgentData(prompt) {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                if (!response.ok) throw new Error("API Error");

                const data = await response.json();
                
                let jsonResponse;
                if (data.candidates && data.candidates[0].content && data.candidates[0].content.parts) {
                    let text = data.candidates[0].content.parts[0].text;
                    // clean up potential markdown wrapping just in case
                    text = text.replace(/```json\n?/g, "").replace(/```\n?/g, "");
                    jsonResponse = JSON.parse(text);
                } else {
                    throw new Error("Invalid response format.");
                }

                const keys = ["historian", "analyst", "strategist", "marketExpert"];
                for (let i = 0; i < 4; i++) {
                    const contentDiv = document.getElementById(`content-${i}`);
                    const actualContent = contentDiv.querySelector('.actual-content');
                    const skeleton = contentDiv.querySelector('.skeleton-loader');
                    
                    skeleton.classList.add('hidden');
                    actualContent.classList.remove('hidden');
                    
                    let contentText = jsonResponse[keys[i]] || "No data provided.";
                    actualContent.innerHTML = contentText;
                }
            } catch (err) {
                console.error(err);
                for (let i = 0; i < 4; i++) {
                    const contentDiv = document.getElementById(`content-${i}`);
                    const actualContent = contentDiv.querySelector('.actual-content');
                    const skeleton = contentDiv.querySelector('.skeleton-loader');
                    
                    skeleton.classList.add('hidden');
                    actualContent.classList.remove('hidden');
                    actualContent.innerHTML = "<div class='error-msg'><i data-lucide='wifi-off'></i> <span>Connection error or data unavailable.</span></div>";
                }
                lucide.createIcons();
            }
        }
    </script>
</body>

</html>
