<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Company Analyzer</title>
    <link rel="stylesheet" href="stock.css">
</head>

<body>
    <div id="search-container">
        <input type="text" id="companyInput" placeholder="Enter company name..." autocomplete="off">
    </div>
    <div id="grid">
        <div class="card">
            <h2>Corporate Historian</h2>
            <div class="card-content" id="content-0"></div>
        </div>
        <div class="card">
            <h2>Financial Analyst</h2>
            <div class="card-content" id="content-1"></div>
        </div>
        <div class="card">
            <h2>Corporate Strategist</h2>
            <div class="card-content" id="content-2"></div>
        </div>
        <div class="card">
            <h2>Stock Market Expert</h2>
            <div class="card-content" id="content-3"></div>
        </div>
    </div>
    <script>
        const API_KEY = "AIzaSyB4aVIDxhiFBxgAGDnQDoZrdJSsdXiOZEU";

        const input = document.getElementById("companyInput");
        const searchContainer = document.getElementById("search-container");
        const grid = document.getElementById("grid");

        input.addEventListener("keydown", async (e) => {
            if (e.key === "Enter" && input.value.trim() !== "") {
                const company = input.value.trim();
                searchContainer.classList.add("active");
                grid.classList.add("active");

                for (let i = 0; i < 4; i++) {
                    document.getElementById(`content-${i}`).innerHTML = "<span class='loading'>loading...</span>";
                }

                const prompts = [
                    `You are a corporate historian. Provide a concise introduction, list the founding members, founding date, and core business details for the company: ${company}.`,
                    `You are a financial analyst. Provide a summary of the most recent profit statements, revenue, and key financial metrics for the company: ${company}.`,
                    `You are a corporate strategist. Summarize the recent major news events and detail any known future projects or strategic initiatives for the company: ${company}.`,
                    `You are a stock market expert. Recommend a logical 'buy' price target and 'sell' price target for ${company} stock. Briefly explain your reasoning. Include a disclaimer that this is AI generated and not financial advice.`
                ];

                // Stagger requests to avoid 429 Too Many Requests (Rate Limiting)
                prompts.forEach((prompt, index) => {
                    setTimeout(() => {
                        fetchAgentData(prompt, index);
                    }, index * 1500); // 1.5 second delay between each request
                });
            }
        });

        async function fetchAgentData(prompt, index) {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const el = document.getElementById(`content-${index}`);

                if (!response.ok) {
                    el.innerHTML = "Error retrieving data.";
                    return;
                }

                const data = await response.json();
                if (data.candidates && data.candidates[0].content && data.candidates[0].content.parts) {
                    let text = data.candidates[0].content.parts[0].text;
                    text = text.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
                    el.innerHTML = text.replace(/\n/g, "<br>");
                } else {
                    el.innerHTML = "Invalid response format.";
                }
            } catch (err) {
                document.getElementById(`content-${index}`).innerHTML = "Connection error.";
            }
        }
    </script>
</body>

</html>
